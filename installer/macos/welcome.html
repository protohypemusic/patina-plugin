<!DOCTYPE html>
<html>
<head>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        background: #1c1429;
        color: #ffffff;
        padding: 20px 30px;
        line-height: 1.6;
    }
    h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 4px;
        color: #ffffff;
    }
    .accent {
        color: #a373f8;
    }
    .subtitle {
        font-size: 14px;
        color: #a373f8;
        margin-bottom: 20px;
        letter-spacing: 1px;
        text-transform: uppercase;
    }
    p {
        font-size: 14px;
        color: #cccccc;
        margin-bottom: 12px;
    }
    .version {
        font-size: 12px;
        color: #888888;
        margin-top: 24px;
    }
</style>
</head>
<body>
    <h1>Welcome to <span class="accent">Patina</span></h1>
    <div class="subtitle">by Max Pote</div>

    <p>Patina is a lo-fi texture and degradation plugin that adds warmth,
       grit, and character to your productions.</p>

    <p>This installer will place the plugin in your system audio plugins
       folder so your DAW can find it automatically.</p>

    <p>Click <strong>Continue</strong> to proceed.</p>

    <div class="version">Version 1.0.0</div>
</body>
</html>
